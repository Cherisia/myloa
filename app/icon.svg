<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="mGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#ECFEFF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="white"/>
  <rect width="32" height="32" rx="8" fill="url(#bgGrad)" opacity="0.8"/>
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7.25"
        fill="none" stroke="#C7D2FE" stroke-width="1"/>

  <!-- Geometric M — stroke style, modern & clean -->
  <polyline
    points="7.1,24.9 7.1,7.5 16,17.3 24.9,7.5 24.9,24.9"
    fill="none"
    stroke="url(#mGrad)"
    stroke-width="3.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>
